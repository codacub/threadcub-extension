<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreadCub — Sign in</title>
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Averia+Sans+Libre:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-family-system);
      background: var(--color-warm-50);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-6);
    }

    /* ── Card ── */
    .tc-card {
      background: var(--color-warm-white);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      width: 100%;
      max-width: 400px;
      padding: var(--spacing-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-6);
      animation: tc-fade-up 0.4s ease both;
    }

    @keyframes tc-fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes tc-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Banner ── */
    .tc-banner {
      width: 100%;
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      padding: var(--spacing-3) var(--spacing-4);
      border-radius: var(--border-radius-lg);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
    }

    .tc-banner svg { flex-shrink: 0; }

    .tc-banner--info {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      color: #1D4ED8;
    }

    .tc-banner--success {
      background: var(--color-accent-green-bg, #E8F5EE);
      border: 1px solid var(--color-accent-green, #52A878);
      color: var(--color-accent-green, #52A878);
    }

    /* ── Bear logo ── */
    .tc-logo {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tc-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── Hero text ── */
    .tc-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-2);
      text-align: center;
    }

    .tc-title {
      font-family: var(--font-family-title);
      font-weight: var(--font-weight-bold);
      font-size: var(--font-size-2xl);
      color: var(--color-warm-900);
      line-height: var(--line-height-tight);
    }

    /* ── Success headline ── */
    .tc-success-headline {
      font-family: var(--font-family-title);
      font-weight: var(--font-weight-bold);
      font-size: var(--font-size-2xl);
      color: var(--color-warm-900);
      line-height: var(--line-height-tight);
      text-align: center;
    }

    /* ── Actions ── */
    .tc-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-3);
    }

    .tc-btn-primary {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: var(--color-primary);
      color: var(--color-warm-white);
      border: none;
      border-radius: var(--border-radius-lg);
      padding: var(--spacing-3) var(--spacing-6);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      font-family: var(--font-family-system);
      cursor: pointer;
      transition: background var(--transition-base);
    }

    .tc-btn-primary:hover { background: var(--color-primary-hover); }

    .tc-signin-link {
      font-size: var(--font-size-sm);
      color: var(--color-warm-700);
    }

    .tc-signin-link a {
      color: var(--color-primary-text);
      text-decoration: none;
      font-weight: var(--font-weight-medium);
    }

    .tc-signin-link a:hover { text-decoration: underline; }

    /* ── Divider ── */
    .tc-divider {
      width: 100%;
      height: 1px;
      background: var(--color-warm-200);
    }

    /* ── Social links ── */
    .tc-social {
      display: flex;
      align-items: center;
      gap: var(--spacing-4);
    }

    .tc-social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: var(--color-warm-500);
      transition: color var(--transition-base), background var(--transition-base);
      text-decoration: none;
    }

    .tc-social-link:hover {
      color: var(--color-warm-900);
      background: var(--color-warm-100);
    }

    .tc-social-link svg { display: block; }

    /* ── Tagline ── */
    .tc-tagline {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-2);
      color: var(--color-warm-500);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
    }

    .tc-tagline svg { stroke: var(--color-warm-500); }

    /* ── State visibility ── */
    .tc-state { display: contents; }
    .tc-state[hidden] { display: none; }
  </style>
</head>
<body>

  <div class="tc-card">

    <!-- SIGN-IN STATE -->
    <div class="tc-state" id="stateSignin">

      <!-- Info banner -->
      <div class="tc-banner tc-banner--info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4"/>
          <path d="M12 8h.01"/>
        </svg>
        Sign in to continue a chat
      </div>

      <!-- Bear logo -->
      <div class="tc-logo">
        <img src="assets/images/coda/coda_happy.svg" alt="ThreadCub bear" onerror="this.style.display='none'">
      </div>

      <!-- Title -->
      <div class="tc-hero">
        <h1 class="tc-title">Your AI chats,<br>saved and organised</h1>
      </div>

      <!-- Auth buttons -->
      <div class="tc-actions">
        <a href="https://www.threadcub.com/auth?mode=signup&from=extension" class="tc-btn-primary">
          Create a free account
        </a>
        <p class="tc-signin-link">
          Already have an account?
          <a href="https://www.threadcub.com/auth?mode=signin&from=extension">Sign in to sync</a>
        </p>
      </div>

    </div>

    <!-- SUCCESS STATE -->
    <div class="tc-state" id="stateSuccess" hidden>

      <!-- Success banner -->
      <div class="tc-banner tc-banner--success">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <path d="m9 11 3 3L22 4"/>
        </svg>
        You're all set!
      </div>

      <!-- Bear logo -->
      <div class="tc-logo">
        <img src="assets/images/coda/coda_happy.svg" alt="ThreadCub bear" onerror="this.style.display='none'">
      </div>

      <!-- Success headline -->
      <p class="tc-success-headline">You can close this tab now.</p>

    </div>

    <!-- Divider + social (always visible) -->
    <div class="tc-divider"></div>

    <div class="tc-social">
      <!-- Discord -->
      <a href="https://discord.gg/PDjByPDqRR" target="_blank" rel="noopener" class="tc-social-link" title="Discord">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.031.057a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
        </svg>
      </a>
      <!-- Substack -->
      <a href="https://threadcub.substack.com" target="_blank" rel="noopener" class="tc-social-link" title="Substack">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 4H2v6h20V4Z"/>
          <path d="M2 10v10l10-6 10 6V10"/>
        </svg>
      </a>
      <!-- X / Twitter -->
      <a href="https://x.com/threadcub" target="_blank" rel="noopener" class="tc-social-link" title="X">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L2.012 2.25h6.962l4.265 5.632L18.244 2.25Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/>
        </svg>
      </a>
    </div>

    <!-- Tagline -->
    <div class="tc-tagline">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="4" r="2"/>
        <circle cx="18" cy="8" r="2"/>
        <circle cx="20" cy="16" r="2"/>
        <path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/>
      </svg>
      <span>Tiny paws. Mighty exports.</span>
    </div>

  </div>

  <script src="signin.js"></script>
</body>
</html>
